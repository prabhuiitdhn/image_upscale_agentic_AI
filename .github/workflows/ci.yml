name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile all Python files
        run: python -m compileall .

      - name: Import smoke test
        run: |
          python -c "import sys; sys.path.insert(0, '.'); import config_loader, workflow_agent, beginner_workflow_agent, github_sync_agent, image_resize, image_quality_check, main, partition_and_upscale, uncompressed_image; print('import-smoke-ok')"
